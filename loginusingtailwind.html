<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex justify-center items-center h-screen bg-red-100">
    <div class="border-2 border-red-500 w-1/5 bg-blue-100  p-5 shadow-xl rounded-2xl ">
        <h2 class="text-3xl text-gray-800 text-center font-bold my-4">Login Form</h2>

        <form action="">
            <label for="">Email address</label>
            <input class="border px-4 py-2 w-full rounded-md mb-6" type="email">

            <label for="">Password</label>
            <input class="border px-4 py-2 w-full rounded-md mb-6" type="password">

            <a href="#" class="text-[red] block mt-2 text-center ">Forgot Password</a>
            <br><br>

            <button class="bg-[red] block w-full py-2 px-4 text-white font-bold hover:bg-[#8a2be2]">Submit</button>
            <a href="#" class="bg-[blueviolet] block mt-2 text-center ">Not registered yet ? Signup now</a>
        </form>
    </div>
  </body>
</html>
