<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admission Form</title>
</head>
<body>
    <h1> Student Admission Form </h1>

    <form > 

        
        <label for="">Student Name </label>
        <input type="text"  required minlength="3" maxlength="20">
            <br>
            <br>
        <label for="">Student Email </label>
        <input type="email" >
            <br>
            <br>
        <label for="">Date Of Birth </label>
        <input type="date" >
            <br>
            <br>
        <label for="">Address </label>
        <textarea cols="30" rows="10"></textarea>
            <br>
            <br>

            <label for="">Gender </label>
            <input type="radio" name="gender" >MALE
            <input type="radio" name="gender" >FEMALE
            <input type="radio" name="gender" >OTHER
            <br>
            <br>
            
            <label for="">Course </label>
            <select>
                <option value="">MERN STACK DEVELOPEMENT</option>
                <option value="">DATA SCIENCE</option>
                <option value="">DATA ANALYTICS</option>
                <option value="">DEV OPS</option>
            </select>
            <br>
            <br>
            <label for="">Select College </label>
            <input type="text" list="college">
            <datalist id="college">
                <option>SRMCEM</option>
                <option>BBD</option>
                <option>BBAU</option>  
            </datalist>
            <br>       
            <br>

           
            <input type="checkbox" id="terms">
            <label for="terms">I agree to the terms and conditions</label>
            <br>
            <br>    
            <details>
                <summary>View Instructions</summary>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Rem fuga sequi sapiente delectus at debitis distinctio
                    autem, esse culpa, doloribus saepe sed assumenda cumque earum magni impedit, eos qui pariatur.</p>
            </details>
            <br>        
            


             <button type="submit">Submit</button>
    </form>

</body>
</html>
