<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>
<style>
    .card{
        border: 2px solid black;
        width: 30%;
        height: 50%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
}

    body{
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: rgb(104, 6, 241);
        border-radius: 50px;
        padding: 200px;
    }
</style>
<body>
    
    <div class="card">
        <h1>Login Form</h1>
        <form>
            <label for="username">Username:</label>
            <input class="text input" type="username">
            

            <label for="password">Password:</label>
            <input class="text input" type="password">
         

            <button class="btn-submit">Login</button>
        </form>

</body>
</html>
