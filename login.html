<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link href="https://fonts.googleapis.com/css?family=Roboto:100,200,300,regular,500,600,700,800,900,100italic,200italic,300italic,italic,500italic,600italic,700italic,800italic,900italic" rel="stylesheet" />

    <style>
        *{
            font-family: roboto;
        }
        .card{
            border: 2px solid red;
            width: 20%;
            background-color: white;
            border-radius: 20px;
            padding: 20px;
            /* x-offset y-offset blur size color */
            box-shadow: 3px 3px 5px 0px rgba(0, 0, 0, 0.397);

        }

        body{
            display: flex;
            /* for horizontal center alignment use justify-content: center; */
            justify-content: center;
            align-items: center;

            height: 100vh;
            /* background-color: lightgray; */
            /*background-image: linear-gradient(270deg, #0ca535 , #611b1b , #5b35f3);*/

            background-image:  linear-gradient(270deg, #0ca53518 , #611b1b , #5b35f3), url(https://wallup.net/wp-content/uploads/2016/01/97831-Batman-748x468.jpg);


        }
        .form-title{

            text-align:center;
            font-size: 30px;
        }
        .text-input{
            display: block;
            width: 100%;
            padding: 10px 10px ;
            border-radius: 5px;
            box-sizing: border-box;
            margin-bottom: 30px;
            margin-top: 5px;
            border: none;
            border: 1px solid black;


        }
        .btn-submit{
            background-color: blueviolet;
            color: white;
            width: 100%;
            padding: 10px;
            border-radius: 50px;
            border: none;
        }
        .link{
            text-decoration: none;
            color: blueviolet;
            display: block;
            margin: 10px 0;
        }
        .forget-link{
            text-align:right;

        }
        .signup-link{
            text-align: center;
        }
    



    </style>


</head>


<body>

    <div class="card">
        <h2 class="form-title">Login Form</h2>

        <form>
            <label for="">Email address</label>
            <input class="text-input" type="email">

            <label for="">Password</label>
            <input class="text-input" type="password">

            <a href="#" class="link forget-link">Forgot Password</a>

            <button class="btn-submit">Submit</button>
            <a href="#" class="link signup-link">Not registered yet ? Signup now</a>
        </form>
    </div>


</body>
</html>
