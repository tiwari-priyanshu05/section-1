
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Elements</title>
    <link rel="stylesheet" href="style.css">

    <style>
        h2 {
            color: #2563EB;
            text-decoration: underline dotted #06B6D4;
            font-size: 50px;
        }

        .text {
            color: #DB2777;
            font-size: 30px;
            border: 2px solid black;
        }

        #mytext {
            background-color: #1E293B;

            color: #A3E635;
            font-weight: bold;
            font-size: 30px;
        }

        h3 {
            color: #7C3AED !important;
            font-size: 40px;
        }

        .myclass {
            color: #EF4444;
        }

        #myid {
            color: #10B981;
        }
    </style>
</head>
</head>

<body>

    <h1 style="color: #4338CA; font-size: 80px;">Inline CSS is used to style indivdual tag only</h1>
    <h2 style="color: #14B8A6; font-size: 50px;">Internal CSS is used to style multiple tags at once</h2>
    <h2 class="text"> Name Selector is used to select elements by their tag name </h2>
    <p class="text">Class selector is used to select element by their class name</p>
    <p id="mytext">ID selector is used to select elements by their ID</p>
    <h3 class="myclass" id="myid" style="color: cadetblue;"> Selector Priority</h3>
    <button class="btn">Click Here</button>
</body>

</body>

</html>
